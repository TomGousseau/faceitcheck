<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Ramp -->
  <path d="M200 650 L350 650 L350 450" stroke="#f59e0b" stroke-width="35" fill="none" opacity="0.3"/>
  <text x="280" y="630" fill="#f59e0b" font-size="16">RAMP</text>
  <!-- Mid -->
  <path d="M350 550 L550 550 L550 350" stroke="#22c55e" stroke-width="30" fill="none" opacity="0.3"/>
  <text x="450" y="530" fill="#22c55e" font-size="16">MID</text>
  <!-- A Ramp -->
  <path d="M200 350 L400 350 L550 250" stroke="#ef4444" stroke-width="30" fill="none" opacity="0.3"/>
  <text x="300" y="330" fill="#ef4444" font-size="14">A RAMP</text>
  <!-- Scaffolding -->
  <rect x="620" y="550" width="100" height="120" fill="#8b5cf6" opacity="0.3" rx="5"/>
  <text x="670" y="620" text-anchor="middle" fill="#fff" font-size="12">SCAFFOLD</text>
  <!-- A Site -->
  <rect x="550" y="150" width="180" height="160" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="640" y="240" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">A</text>
  <!-- B Site -->
  <rect x="350" y="350" width="160" height="150" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="430" y="435" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">B</text>
  <!-- Elevator -->
  <rect x="280" y="450" width="50" height="80" fill="#06b6d4" opacity="0.4" rx="5"/>
  <text x="305" y="495" text-anchor="middle" fill="#fff" font-size="10">ELEV</text>
  <!-- T Spawn -->
  <circle cx="150" cy="500" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="150" y="510" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="800" cy="300" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="800" y="310" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="950" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">VERTIGO</text>
</svg>