<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Long A -->
  <path d="M100 500 L400 500 L400 200 L650 200" stroke="#ef4444" stroke-width="40" fill="none" opacity="0.3"/>
  <text x="250" y="480" fill="#ef4444" font-size="18">LONG A</text>
  <!-- Short A / Catwalk -->
  <path d="M500 700 L500 400 L650 200" stroke="#f59e0b" stroke-width="30" fill="none" opacity="0.3"/>
  <text x="480" y="550" fill="#f59e0b" font-size="16">CAT</text>
  <!-- B Tunnels -->
  <path d="M100 700 L300 700 L400 600 L400 400" stroke="#3b82f6" stroke-width="35" fill="none" opacity="0.3"/>
  <text x="200" y="680" fill="#3b82f6" font-size="16">TUNNELS</text>
  <!-- Mid -->
  <rect x="450" y="500" width="80" height="150" fill="#22c55e" opacity="0.3" rx="5"/>
  <text x="490" y="585" text-anchor="middle" fill="#fff" font-size="18">MID</text>
  <!-- A Site -->
  <rect x="580" y="120" width="180" height="160" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="670" y="210" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">A</text>
  <!-- B Site -->
  <rect x="350" y="280" width="150" height="150" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="425" y="365" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">B</text>
  <!-- T Spawn -->
  <circle cx="100" cy="600" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="100" y="610" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="850" cy="350" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="850" y="360" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="950" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">DUST 2</text>
</svg>