<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Connector -->
  <path d="M300 300 L500 300 L500 500 L700 500" stroke="#22c55e" stroke-width="35" fill="none" opacity="0.3"/>
  <text x="400" y="280" fill="#22c55e" font-size="16">CONNECTOR</text>
  <!-- Long A -->
  <path d="M200 600 L400 600 L400 350" stroke="#ef4444" stroke-width="30" fill="none" opacity="0.3"/>
  <text x="250" y="580" fill="#ef4444" font-size="16">LONG</text>
  <!-- B Short -->
  <path d="M200 750 L450 750 L600 650" stroke="#3b82f6" stroke-width="30" fill="none" opacity="0.3"/>
  <text x="350" y="730" fill="#3b82f6" font-size="16">SHORT</text>
  <!-- Monster -->
  <path d="M700 700 L700 550" stroke="#8b5cf6" stroke-width="25" fill="none" opacity="0.3"/>
  <text x="720" y="630" fill="#8b5cf6" font-size="14">MONSTER</text>
  <!-- A Site -->
  <rect x="550" y="200" width="180" height="160" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="640" y="290" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">A</text>
  <!-- B Site -->
  <rect x="550" y="550" width="180" height="160" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="640" y="640" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">B</text>
  <!-- T Spawn -->
  <circle cx="150" cy="680" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="150" y="690" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="850" cy="400" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="850" y="410" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="950" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">OVERPASS</text>
</svg>