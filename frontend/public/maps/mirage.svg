<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Main paths -->
  <path d="M200 600 L400 600 L400 400 L600 400 L600 200 L800 200" stroke="#3b82f6" stroke-width="40" fill="none" opacity="0.3"/>
  <path d="M200 800 L500 800 L500 500 L800 500" stroke="#3b82f6" stroke-width="40" fill="none" opacity="0.3"/>
  <!-- A Site -->
  <rect x="650" y="150" width="150" height="150" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="725" y="235" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">A</text>
  <!-- B Site -->
  <rect x="650" y="450" width="150" height="150" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="725" y="535" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">B</text>
  <!-- Mid -->
  <rect x="400" y="350" width="100" height="200" fill="#22c55e" opacity="0.3" rx="10"/>
  <text x="450" y="460" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">MID</text>
  <!-- T Spawn -->
  <circle cx="200" cy="700" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="200" y="710" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="850" cy="350" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="850" y="360" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="950" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">MIRAGE</text>
</svg>