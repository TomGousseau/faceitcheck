<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Main paths -->
  <path d="M200 500 L400 500 L400 300 L600 300" stroke="#ef4444" stroke-width="35" fill="none" opacity="0.3"/>
  <path d="M200 700 L500 700 L500 500 L700 500" stroke="#3b82f6" stroke-width="35" fill="none" opacity="0.3"/>
  <!-- Mid -->
  <path d="M350 600 L500 450" stroke="#22c55e" stroke-width="25" fill="none" opacity="0.3"/>
  <text x="400" y="510" fill="#22c55e" font-size="16">MID</text>
  <!-- Cave -->
  <rect x="250" y="350" width="80" height="100" fill="#8b5cf6" opacity="0.3" rx="5"/>
  <text x="290" y="410" text-anchor="middle" fill="#fff" font-size="14">CAVE</text>
  <!-- A Site -->
  <rect x="580" y="180" width="180" height="170" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="670" y="275" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">A</text>
  <!-- B Site -->
  <rect x="580" y="430" width="180" height="170" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="670" y="525" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">B</text>
  <!-- T Spawn -->
  <circle cx="150" cy="600" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="150" y="610" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="850" cy="350" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="850" y="360" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="950" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">ANCIENT</text>
</svg>