<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Banana -->
  <path d="M200 700 L200 400 L400 400" stroke="#f59e0b" stroke-width="35" fill="none" opacity="0.4"/>
  <text x="200" y="550" text-anchor="middle" fill="#f59e0b" font-size="18" transform="rotate(-90 200 550)">BANANA</text>
  <!-- Mid -->
  <path d="M300 800 L500 600 L700 600" stroke="#3b82f6" stroke-width="30" fill="none" opacity="0.3"/>
  <!-- A Site -->
  <rect x="600" y="200" width="180" height="180" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="690" y="300" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">A</text>
  <!-- B Site -->
  <rect x="350" y="300" width="150" height="150" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="425" y="385" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold">B</text>
  <!-- Apartments -->
  <rect x="650" y="550" width="120" height="200" fill="#8b5cf6" opacity="0.3" rx="10"/>
  <text x="710" y="660" text-anchor="middle" fill="#fff" font-size="16">APPS</text>
  <!-- T Spawn -->
  <circle cx="200" cy="850" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="200" y="860" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="700" cy="100" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="700" y="110" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="970" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">INFERNO</text>
</svg>