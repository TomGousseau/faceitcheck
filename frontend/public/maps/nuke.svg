<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#mapBg)"/>
  <!-- Outside/Yard -->
  <path d="M150 400 L350 400 L350 250" stroke="#22c55e" stroke-width="35" fill="none" opacity="0.3"/>
  <text x="200" y="380" fill="#22c55e" font-size="16">YARD</text>
  <!-- Secret -->
  <path d="M150 600 L250 600 L250 750" stroke="#8b5cf6" stroke-width="25" fill="none" opacity="0.3"/>
  <text x="180" y="680" fill="#8b5cf6" font-size="14">SECRET</text>
  <!-- Ramp -->
  <path d="M400 700 L550 700 L550 500" stroke="#f59e0b" stroke-width="30" fill="none" opacity="0.3"/>
  <text x="500" y="680" fill="#f59e0b" font-size="16">RAMP</text>
  <!-- A Site (Upper) -->
  <rect x="500" y="150" width="200" height="180" fill="#ef4444" opacity="0.4" rx="10"/>
  <text x="600" y="250" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold">A</text>
  <text x="600" y="280" text-anchor="middle" fill="#fff" font-size="14">(UPPER)</text>
  <!-- B Site (Lower) -->
  <rect x="500" y="450" width="200" height="180" fill="#3b82f6" opacity="0.4" rx="10"/>
  <text x="600" y="550" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold">B</text>
  <text x="600" y="580" text-anchor="middle" fill="#fff" font-size="14">(LOWER)</text>
  <!-- Vent connection -->
  <path d="M600 330 L600 450" stroke="#64748b" stroke-width="15" stroke-dasharray="10,5" fill="none" opacity="0.5"/>
  <text x="630" y="390" fill="#64748b" font-size="12">VENT</text>
  <!-- T Spawn -->
  <circle cx="150" cy="500" r="50" fill="#f59e0b" opacity="0.5"/>
  <text x="150" y="510" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">T</text>
  <!-- CT Spawn -->
  <circle cx="850" cy="400" r="50" fill="#06b6d4" opacity="0.5"/>
  <text x="850" y="410" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">CT</text>
  <!-- Map name -->
  <text x="512" y="950" text-anchor="middle" fill="#64748b" font-size="48" font-weight="bold">NUKE</text>
</svg>